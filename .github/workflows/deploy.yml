name: Deploy to Server

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
          DATABASE_URI: file:./database.db
          NEXT_PUBLIC_SITE_URL: https://denis-andreeschev.ru

      - name: Package build
        run: |
          tar czf deploy.tar.gz \
            --exclude='.next/cache' \
            .next \
            public \
            package.json \
            package-lock.json \
            next.config.ts \
            tsconfig.json \
            postcss.config.mjs \
            src

      - name: Deploy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: deploy.tar.gz
          target: /tmp/

      - name: Unpack and restart
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 5m
          script: |
            cd /home/deploy/denis-andreeschev
            rm -rf .next src public
            tar xzf /tmp/deploy.tar.gz
            rm /tmp/deploy.tar.gz
            npm install --omit=dev
            npx payload migrate || true
            cat > .env.local <<ENVEOF
            PAYLOAD_SECRET=${{ secrets.PAYLOAD_SECRET }}
            DATABASE_URI=file:./database.db
            NEXT_PUBLIC_SITE_URL=https://denis-andreeschev.ru
            SMTP_USER=${{ secrets.SMTP_USER }}
            SMTP_PASS=${{ secrets.SMTP_PASS }}
            ENVEOF
            sed -i 's/^            //' .env.local

            # Nginx config with gzip, cache, proxy_cache
            sudo tee /etc/nginx/sites-available/denis-andreeschev > /dev/null <<'NGINX'
            proxy_cache_path /var/cache/nginx/denis levels=1:2 keys_zone=denis:10m max_size=100m inactive=10m;

            server {
                listen 80;
                server_name denis-andreeschev.ru www.denis-andreeschev.ru;
                return 301 https://$host$request_uri;
            }

            server {
                listen 443 ssl http2;
                server_name denis-andreeschev.ru www.denis-andreeschev.ru;

                ssl_certificate /etc/letsencrypt/live/denis-andreeschev.ru/fullchain.pem;
                ssl_certificate_key /etc/letsencrypt/live/denis-andreeschev.ru/privkey.pem;

                gzip on;
                gzip_vary on;
                gzip_proxied any;
                gzip_comp_level 6;
                gzip_min_length 256;
                gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
                gzip_static on;

                location /_next/static/ {
                    proxy_pass http://127.0.0.1:3000;
                    expires 365d;
                    add_header Cache-Control "public, max-age=31536000, immutable";
                }

                location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2|woff|ttf|eot)$ {
                    proxy_pass http://127.0.0.1:3000;
                    expires 365d;
                    add_header Cache-Control "public, max-age=31536000, immutable";
                }

                location / {
                    proxy_pass http://127.0.0.1:3000;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection 'upgrade';
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                    proxy_cache_bypass $http_upgrade;

                    proxy_cache denis;
                    proxy_cache_valid 200 10m;
                    proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
                    proxy_ignore_headers Cache-Control Set-Cookie;
                    add_header X-Cache-Status $upstream_cache_status;
                }

                location /admin {
                    proxy_pass http://127.0.0.1:3000;
                    proxy_http_version 1.1;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                    proxy_no_cache 1;
                    proxy_cache_bypass 1;
                }

                location /api {
                    proxy_pass http://127.0.0.1:3000;
                    proxy_http_version 1.1;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                    proxy_no_cache 1;
                    proxy_cache_bypass 1;
                }
            }
            NGINX
            sudo sed -i 's/^            //' /etc/nginx/sites-available/denis-andreeschev
            sudo ln -sf /etc/nginx/sites-available/denis-andreeschev /etc/nginx/sites-enabled/
            sudo sed -i '/brotli/d' /etc/nginx/nginx.conf 2>/dev/null || true
            sudo mkdir -p /var/cache/nginx/denis
            sudo nginx -t && sudo systemctl reload nginx

            # SSL auto-renewal
            sudo systemctl enable certbot.timer 2>/dev/null || true
            sudo systemctl start certbot.timer 2>/dev/null || true

            # pm2-logrotate
            pm2 install pm2-logrotate 2>/dev/null || true
            pm2 set pm2-logrotate:max_size 10M 2>/dev/null || true
            pm2 set pm2-logrotate:retain 7 2>/dev/null || true

            # Graceful reload instead of restart
            pm2 reload denis-andreeschev || pm2 restart denis-andreeschev
            pm2 save

            # Backup DB to /var/backups
            sudo mkdir -p /var/backups/denis-andreeschev
            sudo chown deploy:deploy /var/backups/denis-andreeschev
            if ! crontab -l 2>/dev/null | grep -q '/var/backups/denis'; then
              (crontab -l 2>/dev/null; echo '0 3 * * * cp /home/deploy/denis-andreeschev/database.db /var/backups/denis-andreeschev/db-$(date +\%Y\%m\%d).db') | crontab -
              (crontab -l 2>/dev/null; echo '0 4 * * * find /var/backups/denis-andreeschev -name "db-*.db" -mtime +30 -delete') | crontab -
            fi

            # Disable ufw to prevent port blocking
            sudo ufw disable 2>/dev/null || true
            # Ensure iptables allows web traffic
            sudo iptables -C INPUT -p tcp --dport 80 -j ACCEPT 2>/dev/null || sudo iptables -I INPUT -p tcp --dport 80 -j ACCEPT
            sudo iptables -C INPUT -p tcp --dport 443 -j ACCEPT 2>/dev/null || sudo iptables -I INPUT -p tcp --dport 443 -j ACCEPT

      - name: Server diagnostics
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            echo "=== UFW STATUS ==="
            sudo ufw status 2>/dev/null || echo "ufw not installed"
            echo "=== IPTABLES (INPUT) ==="
            sudo iptables -L INPUT -n --line-numbers 2>/dev/null | head -20
            echo "=== NGINX STATUS ==="
            sudo systemctl status nginx --no-pager -l 2>&1 | head -15
            echo "=== PM2 STATUS ==="
            pm2 status
            echo "=== PM2 LOGS (last 30) ==="
            pm2 logs --nostream --lines 30 2>&1 | tail -40
            echo "=== MEMORY ==="
            free -m
            echo "=== DISK ==="
            df -h /
            echo "=== LISTENING PORTS ==="
            sudo ss -tlnp | grep -E ':(80|443|3000)\s'
            echo "=== CURL LOCAL ==="
            curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/ 2>&1
            echo ""
