name: Deploy to Server

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
          DATABASE_URI: file:./database.db
          NEXT_PUBLIC_SITE_URL: https://denis-andreeschev.ru

      - name: Package build
        run: |
          tar czf deploy.tar.gz \
            --exclude='.next/cache' \
            .next \
            public \
            package.json \
            package-lock.json \
            next.config.ts \
            tsconfig.json \
            postcss.config.mjs \
            src

      - name: Deploy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: deploy.tar.gz
          target: /tmp/

      - name: Unpack and restart
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 5m
          script: |
            cd /home/deploy/denis-andreeschev
            rm -rf .next src public
            tar xzf /tmp/deploy.tar.gz
            rm /tmp/deploy.tar.gz
            npm install --omit=dev
            npx payload migrate || true
            pm2 restart denis-andreeschev
            pm2 save
